<!DOCTYPE html>
<html>
<head>
  <title>MDQ Beauty Studio - Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../src/styles.css">
  <script src="../src/script.js" defer></script>
</head>

<body>

<header>
  <div class="logo">MDQ Beauty Studio</div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="header-right">
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
    <div class="toggle-switch">
      <input type="checkbox" id="toggle">
      <label for="toggle" class="toggle-label"></label>
    </div>
    <a href="order.html" class="cart-icon">🛒</a>
  </div>
</header>

<section class="section">
  <h1>Products</h1>
  
  <div class="product-controls">
    <input type="text" placeholder="Search products..." class="search-bar">
    <select class="filter">
      <option>All Categories</option>
      <option>Lip Products</option>
      <option>Foundation</option>
      <option>Tools</option>
    </select>
  </div>
  
  <div class="grid products-grid">
    <div class="card">
      <img src="../images/lips.webp" alt="Lipstick">
      <h3>Lipstick</h3>
      <p>$10</p>
      <div class="rating">⭐⭐⭐⭐⭐</div>
      <a href="order.html" class="btn">Add to Cart</a>
    </div>
    <div class="card">
      <img src="../images/foundation.webp" alt="Foundation">
      <h3>Foundation</h3>
      <p>$15</p>
      <div class="rating">⭐⭐⭐⭐⭐</div>
      <a href="order.html" class="btn">Add to Cart</a>
    </div>
    <div class="card">
      <img src="../images/brush.webp" alt="Brush Set">
      <h3>Brush Set</h3>
      <p>$20</p>
      <div class="rating">⭐⭐⭐⭐⭐</div>
      <a href="order.html" class="btn">Add to Cart</a>
    </div>
    <div class="card">
      <img src="../images/pal.webp" alt="Palette">
      <h3>Palette</h3>
      <p>$18</p>
      <div class="rating">⭐⭐⭐⭐⭐</div>
      <a href="order.html" class="btn">Add to Cart</a>
    </div>
  </div>
</section>

</body>
</html>
